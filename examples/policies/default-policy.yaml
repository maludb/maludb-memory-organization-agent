# Default policy — applies to any tenant without its own.
# Conservative and safe: sweeps run, intelligence is advisory, nothing destructive is automated.
# This file is the baseline that tenant policies override (sparsely).
tenant: default
memory_policy_version: 1

priorities:
  default_domain_weight: 1.0
  domains:
    - { name: architecture,        weight: 1.5 }
    - { name: user_preferences,    weight: 1.3 }
    - { name: transient_debugging, weight: 0.5 }
  scoring:
    staleness: 1.0
    retrieval_frequency: 1.0
    domain: 1.0
    low_confidence: 1.0
    contradiction: 1.5
    model_version_change: 0.75
    recent_failure_penalty: 1.0
    low_value_decay: 1.0

schedules:
  tenant.healthcheck:        { every: "5m" }
  policy.evaluate:           { every: "1h" }
  memory.reindex.sweep:      { cron: "0 * * * *" }
  skills.reindex.sweep:      { cron: "30 2 * * *" }
  embeddings.drain:          { every: "10m" }
  memory.contradiction.scan: { cron: "0 3 * * *" }
  memory.consolidation.scan: { enabled: false }

reindex:
  default_max_age_days: 30
  high_priority_max_age_days: 7
  low_priority_max_age_days: 90
  batch_limit: 32
  max_batches_per_run: 50
  source_type: null

skills_reindex:
  max_age_days: 30
  batch_limit: 32
  max_batches_per_run: 20

embeddings:
  batch_limit: 64
  kinds: [subject, verb]
  max_batches_per_run: 50

contradictions:
  detect: true
  auto_resolve: false
  create_review_items: true
  min_confidence_to_flag: 0.6
  max_subjects_per_run: 200
  group_by: [subject, verb, predicate]

consolidation:
  enabled: false
  min_related_memories: 4
  preserve_source_links: true
  create_summary_claims: true
  require_review: true

lifecycle:
  staleness:
    enabled: false
    stale_after_days: 180
    auto_mark_stale: true
  archival:
    enabled: false
    archive_after_days: 365
    require_review: true
  retirement:
    enabled: false
    require_review: true
  downrank:
    enabled: false
    low_value_score_threshold: 0.2
    require_review: false

cost_controls:
  max_model_calls_per_day: 500
  max_tokens_per_day: 1000000
  prefer_local_models_for_low_priority: true
  on_budget_exhausted: defer

models:
  default:      { provider: anthropic, model: claude-haiku-4-5 }
  low_priority: { provider: ollama,    model: llama3.1 }
  high_quality: { provider: anthropic, model: claude-opus-4-8 }

review:
  required_for: [retirement, consolidation, contradiction_resolution]
  reviewer_queue: default
  fallback_to_notes_issue: true
